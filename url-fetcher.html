<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>URL 内容抓取器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    h1 { color: #333; margin-bottom: 20px; }
    .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
    input { flex: 1; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 6px; }
    button { padding: 12px 24px; font-size: 16px; background: #07c160; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #06ad56; }
    button:disabled { background: #999; cursor: not-allowed; }
    #status { padding: 10px; margin-bottom: 20px; border-radius: 6px; display: none; }
    #status.loading { display: block; background: #fff3cd; color: #856404; }
    #status.success { display: block; background: #d4edda; color: #155724; }
    #status.error { display: block; background: #f8d7da; color: #721c24; }
    #content { background: white; padding: 20px; border-radius: 6px; min-height: 200px; word-wrap: break-word; line-height: 1.6; }
    #content:empty::before { content: "内容将显示在这里..."; color: #999; }
    #content a { color: #07c160; text-decoration: none; }
    #content a:hover { text-decoration: underline; }
    #content img { max-width: 100%; height: auto; border-radius: 4px; margin: 10px 0; }
    #content h1, #content h2, #content h3 { margin: 20px 0 10px; color: #333; }
    #content p { margin: 10px 0; }
    #content ul, #content ol { margin: 10px 0; padding-left: 20px; }
    #content code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-family: monospace; }
    #content pre { background: #f4f4f4; padding: 15px; border-radius: 6px; overflow-x: auto; }
    .saved-files { margin-top: 20px; }
    .saved-files h3 { margin-bottom: 10px; color: #333; }
    .file-list { list-style: none; }
    .file-list li { padding: 8px; background: #e9ecef; margin-bottom: 5px; border-radius: 4px; font-size: 14px; }
  </style>
</head>
<body>
  <h1>URL 内容抓取器</h1>
  
  <div class="input-group">
    <input type="url" id="urlInput" placeholder="输入 URL 地址..." />
    <button id="fetchBtn">获取内容</button>
  </div>
  
  <div id="status"></div>
  
  <div id="content"></div>
  
  <div class="saved-files">
    <h3>已保存的文件</h3>
    <ul id="fileList" class="file-list"></ul>
  </div>

  <script>
    const urlInput = document.getElementById('urlInput');
    const fetchBtn = document.getElementById('fetchBtn');
    const status = document.getElementById('status');
    const content = document.getElementById('content');
    const fileList = document.getElementById('fileList');
    const API_URL = 'http://localhost:3456';

    function showStatus(message, type) {
      status.textContent = message;
      status.className = type;
    }

    // Escape HTML special characters to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Sanitize URL to prevent javascript: protocol attacks
    function sanitizeUrl(url) {
      if (!url) return '';
      const normalized = url.trim().toLowerCase();
      // Block dangerous protocols
      if (normalized.startsWith('javascript:') || 
          normalized.startsWith('data:') || 
          normalized.startsWith('vbscript:') ||
          normalized.startsWith('file:')) {
        return '#';
      }
      return url;
    }

    // Simple markdown to HTML converter with XSS protection
    function markdownToHtml(md) {
      // First escape HTML to prevent injection
      let html = escapeHtml(md);
      
      // Process tables (GFM format)
      // Match table rows: | col1 | col2 | col3 |
      const tableRegex = /(\|[^\n]+\|\n\|[-:\s|]+\|\n)(\|[^\n]+\|\n?)+/g;
      html = html.replace(tableRegex, (match) => {
        const lines = match.trim().split('\n');
        if (lines.length < 2) return match;
        
        // First line is header
        const headerCells = lines[0].split('|').filter(c => c.trim()).map(c => '<th>' + c.trim() + '</th>').join('');
        const headerRow = '<tr>' + headerCells + '</tr>';
        
        // Second line is separator (| --- | --- |), skip it
        // Remaining lines are data rows
        const dataRows = lines.slice(2).map(line => {
          const cells = line.split('|').filter(c => c.trim()).map(c => '<td>' + c.trim() + '</td>').join('');
          return '<tr>' + cells + '</tr>';
        }).join('');
        
        return '<table style="border-collapse: collapse; width: 100%; margin: 10px 0;"><thead>' + headerRow + '</thead><tbody>' + dataRows + '</tbody></table>';
      });
      
      return html
        // Code blocks (must be first to preserve content)
        .replace(/```([\s\S]*?)```/g, (match, code) => {
          return '<pre><code>' + code + '</code></pre>';
        })
        // Inline code
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // Headers
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
        // Bold and italic
        .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        // Images (with no-referrer policy for WeChat images)
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, src) => {
          return '<img alt="' + alt + '" src="' + sanitizeUrl(src) + '" referrerpolicy="no-referrer" />';
        })
        // Links
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, text, href) => {
          return '<a href="' + sanitizeUrl(href) + '" target="_blank" rel="noopener noreferrer">' + text + '</a>';
        })
        // Line breaks (but not inside tables)
        .replace(/<\/table>\n?/g, '</table>\n')
        .replace(/\n/g, '<br>');
    }

    async function checkServer() {
      try {
        const response = await fetch(API_URL, { method: 'GET' });
        return response.ok;
      } catch {
        return false;
      }
    }

    async function fetchUrl() {
      const url = urlInput.value.trim();
      if (!url) {
        showStatus('请输入 URL 地址', 'error');
        return;
      }

      let targetUrl = url.startsWith('http') ? url : `https://${url}`;
      
      fetchBtn.disabled = true;
      showStatus('正在获取内容...', 'loading');
      content.innerHTML = '';

      try {
        // Check if local server is running
        const serverRunning = await checkServer();
        
        if (!serverRunning) {
          showStatus('本地服务器未运行。请先运行: bun wechat-fetcher.ts --server', 'error');
          fetchBtn.disabled = false;
          return;
        }

        // Use local server (with Playwright/Chrome for CAPTCHA handling)
        const response = await fetch(`${API_URL}/fetch`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: targetUrl })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || `获取失败: ${response.status}`);
        }
        
        // Display content as HTML (convert markdown)
        content.innerHTML = markdownToHtml(data.content);
        showStatus('获取成功！', 'success');
        
        // Auto-save to file
        const timestamp = new Date().toISOString().slice(0, 10);
        const filename = `${timestamp}-${data.filename}`;
        
        // Create downloadable file
        const blob = new Blob([data.content], { type: 'text/markdown' });
        const downloadUrl = URL.createObjectURL(blob);
        
        // Auto-download
        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(downloadUrl);
        
        // Add to saved files list
        const li = document.createElement('li');
        li.textContent = `${filename} (${new Date().toLocaleTimeString()})`;
        fileList.insertBefore(li, fileList.firstChild);
        
        // Also save to localStorage for persistence
        const savedFiles = JSON.parse(localStorage.getItem('savedFiles') || '[]');
        savedFiles.unshift({ filename, url: targetUrl, time: new Date().toISOString() });
        localStorage.setItem('savedFiles', JSON.stringify(savedFiles.slice(0, 50)));
        
      } catch (error) {
        showStatus(`错误: ${error.message}`, 'error');
      } finally {
        fetchBtn.disabled = false;
      }
    }

    // Load saved files from localStorage
    function loadSavedFiles() {
      const savedFiles = JSON.parse(localStorage.getItem('savedFiles') || '[]');
      savedFiles.forEach(file => {
        const li = document.createElement('li');
        li.textContent = `${file.filename} (${new Date(file.time).toLocaleTimeString()})`;
        fileList.appendChild(li);
      });
    }

    // Check server status on load
    async function init() {
      const serverRunning = await checkServer();
      if (!serverRunning) {
        showStatus('⚠️ 本地服务器未运行。请先在终端运行: bun wechat-fetcher.ts --server', 'error');
      }
    }

    fetchBtn.addEventListener('click', fetchUrl);
    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') fetchUrl();
    });

    loadSavedFiles();
    init();
  </script>
</body>
</html>
