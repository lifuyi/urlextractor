version: '2.4'

services:
  wechat-fetcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wechat-fetcher
    ports:
      - "3456:3456"
    environment:
      - NODE_ENV=production
      - ALLOWED_ORIGINS=*
    volumes:
      - ./output:/app/output
    restart: unless-stopped
    mem_limit: 384m
    cpus: 0.5
    read_only: true
    tmpfs:
      - /tmp
      - /app/output
